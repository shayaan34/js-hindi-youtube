name: displayvision
description: >-
  DisplayVision — AI-powered digital signage mockup studio for sales teams.
  Capture site photos, detect walls, place virtual LED screens and posters,
  and generate client-ready proposals.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # UI / typography
  google_fonts: ^6.2.1
  lottie: ^3.1.2

  # Media capture & playback
  image_picker: ^1.1.2
  camera: ^0.11.0
  video_player: ^2.9.1

  # Documents & sharing
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  path_provider: ^2.1.4

  # Firebase backend (activated via AppConfig.useFirebase after
  # `flutterfire configure` — the app runs fully in demo mode without it)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
